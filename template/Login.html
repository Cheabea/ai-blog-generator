{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
   <link rel="stylesheet" href="{% static 'login.css' %}">

</head>
<body>
    <nav>
    <div class="blog">
        BLOG 
        <br>
        GENERATOR
      <div>
    <a href="{% url 'login' %}" class="login hover:underline">
        Login
    </a>
    <a href="{% url 'signup' %}" class="login hover:underline">
        Signup
    </a>
</div>
    </div>
</nav> 

<div class="main-container">
    <div class="login-box">
    
        <h2 class="title">Login</h2>

<form action="" method="POST">
    {% csrf_token %}

    {% if error_message %}
    <div class="error-box">
        <h2>{{ error_message }}</h2>
    </div>
    {% endif %}

<div>
    <label for="username" class="label">
        Username
    </label>

    <input 
        type="text"
        id="username"
        name="username"
        placeholder="Enter your username..."
        class="input-field"
        required
    >
</div>

<div>
    <label for="password" class="label">
        Password
    </label>

    <input 
        type="password"
        id="password"
        name="password"
        placeholder="Enter your password..."
        class="input-field"
        required
    >
</div>

<button type="submit" class="login-btn">
    Login
</button>
    
</form>
    
    </div>

</div>

</body>
</html>
