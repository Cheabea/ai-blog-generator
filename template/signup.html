{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="{% static 'signup.css' %}">
</head>
<body>
    <nav>
        <div class="blog">
            BLOG 
            <br>
            GENERATOR
            <div>
                <a href="{% url 'login' %}" class="login hover:underline">
                    Login
                </a>
                <a href="{% url 'signup' %}" class="login hover:underline">
                    Signup
                </a>
            </div>
        </div>
    </nav> 

    <div class="main-container">
        <div class="login-box">
        
            <form action="" method="POST">
                {% csrf_token %}

                {% if error_message %}
                <div class="error-box">
                    <h2>{{ error_message }}</h2>
                </div>
                {% endif %}

                <h2 class="form-title">Signup</h2>
                
                <div>
                    <label for="username" class="label">
                        Username
                    </label>
                    <input 
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Enter your username..."
                        class="input-field"
                        required 
                    > </div>

                <div>
                    <label for="email" class="label">
                        Email
                    </label>
                    <input 
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email..."
                        class="input-field"
                        required 
                    > </div>

                <div>
                    <label for="password" class="label">
                        Password
                    </label>
                    <input 
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password..."
                        class="input-field"
                        required 
                    > </div>

                <div>
                    <label for="repeatpassword" class="label">
                        Repeat Password
                    </label>
                    <input 
                        type="password" 
                        id="repeatpassword"
                        name="repeatpassword"
                        placeholder="Repeat your password..."
                        class="input-field"
                        required 
                    > </div>

                <button type="submit" class="login-btn">
                    Signup
                </button>
                
            </form> </div>
    </div>

</body>
</html>
